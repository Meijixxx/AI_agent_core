[llm]
ollama_url = "http://localhost:11434"
model = "gemma4-agent"
num_ctx = 8192
max_retries = 2
timeout = 120

[agent]
max_tool_loops = 10
max_history_messages = 40
token_budget_warn_ratio = 0.8

[paths]
session_dir = "sessions"
log_dir = "logs"

[log]
level = "INFO"

[server]
host = "0.0.0.0"
port = 8000
api_key = "change-me-to-random-string"
cors_origins = ["*"]
auto_confirm = true
