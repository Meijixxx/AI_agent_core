[llm]
ollama_url = "http://localhost:11434"
model = "gemma4-agent"
num_ctx = 262144          # 260K。CPU推論では重いが128GB RAMで可能
num_predict = -1          # 出力トークン上限。-1 で無制限（推奨）
max_retries = 2
timeout = 600             # 長コンテキストは生成に時間がかかるので延長

[agent]
max_tool_loops = 30               # 大きなファイルの分割処理対応のため増やす
max_history_messages = 80
token_budget_warn_ratio = 0.8

[paths]
session_dir = "sessions"
log_dir = "logs"
rag_dir = "rag_store"

[rag]
# ollama pull nomic-embed-text が必要
embedding_model = "nomic-embed-text"
chunk_size = 500      # チャンクあたりの最大文字数
chunk_overlap = 50    # チャンク間の重複文字数
top_k = 5             # rag_search のデフォルト返却件数

[log]
level = "INFO"

[server]
host = "0.0.0.0"
port = 8000
api_key = "change-me-to-random-string"
cors_origins = ["*"]
auto_confirm = true
